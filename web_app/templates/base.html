<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}策略工作台{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">QS</div>
      <div>
        <div class="brand-title">策略工作台</div>
        <div class="brand-subtitle">Research Console</div>
      </div>
    </div>
    <nav>
      <a class="{{ 'active' if active_nav == 'dashboard' else '' }}" href="/">工作台</a>
      <a class="{{ 'active' if active_nav == 'signals' else '' }}" href="/signals">短线复盘</a>
      <a class="{{ 'active' if active_nav == 'longterm' else '' }}" href="/longterm">长线池</a>
      <a class="{{ 'active' if active_nav == 'sectors' else '' }}" href="/sectors">市场雷达</a>
      <a class="{{ 'active' if active_nav == 'stock' else '' }}" href="/stock/000001">单股体检</a>
      <a class="{{ 'active' if active_nav == 'db' else '' }}" href="/db">数据状态</a>
    </nav>
    <div class="sidebar-note">只读研究看板，不包含交易执行功能。</div>
  </aside>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
