<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}策略工作台{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}?v=20260714-usability-redesign">
</head>
<body class="page-{{ active_nav or 'default' }}">
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-mark">QS</div>
        <div>
          <div class="brand-title">策略工作台</div>
          <div class="brand-subtitle">Research Console</div>
        </div>
      </div>
      <button class="mobile-nav-toggle" type="button" aria-controls="primary-navigation" aria-expanded="false">菜单</button>
    </div>
    <nav id="primary-navigation" aria-label="主导航">
      <a class="{{ 'active' if active_nav == 'dashboard' else '' }}" href="/">工作台</a>
      <a class="{{ 'active' if active_nav == 'signals' else '' }}" href="/signals">短线复盘</a>
      <a class="{{ 'active' if active_nav == 'dragon' else '' }}" href="/dragon">热门龙头</a>
      <a class="{{ 'active' if active_nav == 'longterm' else '' }}" href="/longterm">长线池</a>
      <a class="{{ 'active' if active_nav == 'sectors' else '' }}" href="/sectors">市场雷达</a>
      <a class="{{ 'active' if active_nav == 'stock' else '' }}" href="/stock/000001">单股体检</a>
      <a class="{{ 'active' if active_nav == 'db' else '' }}" href="/db">数据状态</a>
    </nav>
    <div class="sidebar-note">只读研究看板，不包含交易执行功能。</div>
  </aside>
  <main id="main-content" class="content {{ 'market-radar-content' if active_nav == 'sectors' else '' }}">
    {% block content %}{% endblock %}
  </main>
  <script>
  (() => {
    const navToggle = document.querySelector(".mobile-nav-toggle");
    const primaryNavigation = document.querySelector("#primary-navigation");
    const activeNavigationLink = primaryNavigation && primaryNavigation.querySelector("a.active");
    if (activeNavigationLink) activeNavigationLink.setAttribute("aria-current", "page");
    if (navToggle && primaryNavigation) {
      navToggle.addEventListener("click", () => {
        const expanded = navToggle.getAttribute("aria-expanded") === "true";
        navToggle.setAttribute("aria-expanded", String(!expanded));
        primaryNavigation.dataset.open = String(!expanded);
      });
    }

    const forms = document.querySelectorAll("[data-background-update-form]");
    const panels = document.querySelectorAll("[data-update-status-url]");
    if (!forms.length && !panels.length) return;

    const statusUrl = (panels[0] && panels[0].dataset.updateStatusUrl) || "/update/status";
    const pendingKey = "stock:updatePending";
    let reloadWhenFinished = window.sessionStorage.getItem(pendingKey) === "1";

    function updatePanels(status) {
      panels.forEach((panel) => {
        const message = panel.querySelector("[data-update-message]");
        const buttons = panel.querySelectorAll("[data-update-button]");
        const errorBox = panel.querySelector("[data-update-error]");
        const finishedStamp = panel.querySelector("[data-update-finished]");
        const displayMessage = status.display_message || status.message || "状态读取中";
        if (message) {
          let text = `当前状态：${displayMessage}`;
          if (status.started_at && status.running) {
            const eta = status.mode === "full" ? "通常需要 5-30 分钟" : "通常需要 1-5 分钟";
            text += `（开始于 ${status.started_at}，${eta}）`;
          } else if (status.finished_at) {
            text += `（完成于 ${status.finished_at}）`;
          }
          message.textContent = text;
        }
        if (finishedStamp) {
          if (!status.running && status.finished_at) {
            finishedStamp.hidden = false;
            const finishedLabel = status.state === "finished" ? "完成" : "结束";
            finishedStamp.textContent = `${finishedLabel} ${status.finished_at}`;
          } else {
            finishedStamp.hidden = true;
            finishedStamp.textContent = "";
          }
        }
        buttons.forEach((button) => {
          button.disabled = Boolean(status.running);
          if (status.running) {
            button.textContent = button.dataset.updateMode === status.mode ? "正在同步" : "请稍候";
          } else {
            button.textContent = button.dataset.updateLabel || button.textContent;
          }
        });
        if (errorBox) {
          const tail = status.state === "failed" ? (status.stderr_tail || status.stdout_tail || "") : "";
          errorBox.hidden = !tail;
          errorBox.textContent = tail.slice(-1200);
        }
      });
    }

    function maybeReload(status) {
      if (status.running) return;
      if (reloadWhenFinished && status.state === "finished") {
        window.sessionStorage.removeItem(pendingKey);
        reloadWhenFinished = false;
        window.location.reload();
      }
    }

    async function fetchStatus() {
      try {
        const response = await fetch(statusUrl, { cache: "no-store" });
        if (!response.ok) return;
        const status = await response.json();
        updatePanels(status);
        maybeReload(status);
        if (status.running) window.setTimeout(fetchStatus, 5000);
      } catch (error) {
        panels.forEach((panel) => {
          const message = panel.querySelector("[data-update-message]");
          if (message) message.textContent = "当前状态：暂时读取不到更新进度，稍后自动重试。";
        });
        if (reloadWhenFinished) window.setTimeout(fetchStatus, 5000);
      }
    }

    forms.forEach((form) => {
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (form.dataset.confirmMessage && !window.confirm(form.dataset.confirmMessage)) return;
        window.sessionStorage.setItem(pendingKey, "1");
        reloadWhenFinished = true;
        form.querySelectorAll("[data-update-button], button[type='submit']").forEach((button) => {
          button.disabled = true;
          button.textContent = "正在同步";
        });
        try {
          await fetch(form.action, {
            method: "POST",
            headers: { "Accept": "application/json" },
            cache: "no-store",
          });
        } finally {
          fetchStatus();
        }
      });
    });

    fetchStatus();
  })();
  </script>
</body>
</html>
